name: Node.js CI/CD

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - '/assets/**'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.19.4]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
    - name: Install template-editor dependencies
      working-directory: ./projects/template-editor
      run: npm ci

    - name: Replace environment file with demo version
      working-directory: ./projects/shell
      run: |
        cat src/environments/environment.demo.ts > src/environments/environment.ts
        cat public/federation.manifest.demo.json > public/federation.manifest.json

    - name: Build all projects
      run: npm run build:all:demo

    - name: Copy all built files to deploy folder
      run: |
        mkdir deploy
        mkdir deploy/shell
        mkdir deploy/template-editor

        cp -r dist/shell/* deploy/shell/
        cp -r dist/template-editor/* deploy/template-editor/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./deploy
